<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Águia Suplementos</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <header>
        <nav class="container">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="produtos.html">Produtos</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form">
            <h1>Formulário de Contato</h1>
        
        <form method="post" target="_blank">
            <div>
                <label for="nome">Nome</label>
                <input type="text" name="nome" />
            </div>

            <div>
                <label for="cpf">CPF</label>
                <input type="text" name="cpf" 
                minlength="11" maxlength="14" />
            </div>

            <div>
                <label for="email">E-mail *</label>
                <input type="email" name="email" required>
            </div>

            <fieldset>
                <legend>Escolha seus interesses</legend>
                <div>
                    <input type="checkbox" id="hipertrofia" name="hipertrofia" checked />
                    <label for="hipertrofia">Hipertrofia</label>
                </div>
                <div>
                    <input type="checkbox" id="resistencia" name="resistencia" />
                    <label for="resistencia">Resistência</label>
                </div>
                 <div>
                    <input type="checkbox" id="forca" name="forca" />
                    <label for="forca">Força</label>
                </div>
            </fieldset>
            <div>
                <label for="date">Data de nascimento</label>
                <input id="date" type="date" name="date" />
            </div>
            <hr>
            <div>
                <label for="login">Login * </label>
                <input type="text" name="login" required>
            </div>
            <div>
                <label for="senha">Senha * </label>
                <input type="password" name="senha" minlength="8" required>
            </div>
             <input type="submit" value="Cadastrar">
            <input type="reset" value="Limpar">
        </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Águia Suplementos - Todos os direitos reservados</p>

               <div class="footer-col">
                    <h3>Contato</h3>
                    <ul class="contact-list">
                        <li>📍 504 Sul Av Ns 2 77021672, <br>Palmas, To</li>
                        <li>📞 (63) 98455-5235</li>
                        <li><a href="https://www.instagram.com/aguiasuplementos.palmas/">Instagram</a></li>
                    </ul>
                    <div class="social-links">
                
                    </div>
                </div>
        </div>
    </footer>
</body>
</html>
